<!DOCTYPE html>
<html>
<head>
    <title>Form</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-5">

    <h3 class="text-center mb-4">แบบฟอร์มบันทึกข้อมูลประชากร</h3>

    <form method="post" action="/form/">
        {% csrf_token %}

        <div class="mb-3">
            <label class="form-label">ชื่อประชากร</label>
            <input type="text" class="form-control" name="name" placeholder="กรอกชื่อ-นามสกุล">
        </div>

        <div class="mb-3">
            <label class="form-label">อายุ</label>
            <input type="number" class="form-control" name="age" placeholder="กรอกข้อมูลอายุเป็นตัวเลข">
        </div>

        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-success">บันทึกข้อมูล</button>
            <button type="reset" class="btn btn-danger">ล้างข้อมูล</button>
        </div>

    </form>

</div>

</body>
</html>
