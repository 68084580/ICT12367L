<!DOCTYPE html>
<html>
<head>
    <title>ICT12367</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .btn-edit {
            background-color: hotpink;
            color: white;
        }

        .btn-delete {
            background-color: orange;
            color: white;
        }

        td {
            text-align: center;
            vertical-align: middle;
        }
    </style>
</head>

<body>

<div class="container mt-5">

    <!-- หัวข้อ -->
    <h2 style="color: blueviolet;">
        ยินดีต้อนรับเข้าสู่ประชากร
    </h2>
    <a href="/form/" class="btn btn-primary mb-3">เพิ่มข้อมูล</a>

    <!-- ตาราง -->
    <table class="table table-hover mt-3">
        <thead class="table-dark text-center">
            <tr>
                <th>รหัสประชากร</th>
                <th>ชื่อประชากร</th>
                <th>อายุ</th>
                <th>แก้ไข</th>
                <th>ลบ</th>
            </tr>
        </thead>

        <tbody>
            {% for person in all_person %}
            <tr>
                <td>{{ person.id }}</td>
                <td>{{ person.name }}</td>
                <td>{{ person.age }}</td>

                <!-- ปุ่มแก้ไข -->
                <td>
                    <a href="#" class="btn btn-edit">แก้ไข</a>
                </td>

                <!-- ปุ่มลบ -->
                <td>
                    <a href="#" class="btn btn-delete">ลบ</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

</div>

</body>
</html>
